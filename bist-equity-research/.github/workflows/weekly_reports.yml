name: Weekly BIST Equity Research Reports

on:
  schedule:
    # Every Sunday at 07:00 UTC (10:00 AM Istanbul time)
    - cron: '0 7 * * 0'
  workflow_dispatch: # Allow manual trigger

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TCMB_EVDS_API_KEY: ${{ secrets.TCMB_EVDS_API_KEY }}
  APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
  SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  REPORT_RECIPIENT: mehmetemin.kolac@tvf.com.tr

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: bist-equity-research
        run: pip install -r requirements.txt

      - name: Generate all reports and send email
        working-directory: bist-equity-research
        run: python main.py --all --send-email

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: equity-reports-${{ github.run_number }}
          path: bist-equity-research/reports/*.pdf
          retention-days: 90
